{{ $id := .Get "id" | default (printf "slider-%d" (now.Unix)) }}
<div class="slider-container">
  <div class="slider" id="{{ $id }}">
    {{ .Inner }}
  </div>
  <div class="slider-nav">
    <button class="slider-btn prev" onclick="prevSlide('{{ $id }}')">❮</button>
    <button class="slider-btn next" onclick="nextSlide('{{ $id }}')">❯</button>
  </div>
</div>

<style>
.slider-container {
  position: relative;
  max-width: 800px;
  margin: 20px auto;
  border-radius: 12px;
  overflow: hidden;
  box-shadow: 0 8px 32px rgba(0,0,0,0.2);
}

.slider {
  display: flex;
  overflow-x: auto;
  scroll-snap-type: x mandatory;
  scroll-behavior: smooth;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
  -ms-overflow-style: none;
}

.slider::-webkit-scrollbar {
  display: none;
}

.slider > * {
  flex: 0 0 100%;
  scroll-snap-align: start;
}

.slider img {
  width: 100%;
  height: 400px;
  object-fit: cover;
  display: block;
}

.slider-nav {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  width: 100%;
  display: flex;
  justify-content: space-between;
  padding: 0 20px;
  pointer-events: none;
}

.slider-btn {
  background: rgba(0,0,0,0.5);
  color: white;
  border: none;
  padding: 12px 16px;
  cursor: pointer;
  border-radius: 50%;
  font-size: 18px;
  pointer-events: auto;
  transition: background 0.3s;
}

.slider-btn:hover {
  background: rgba(0,0,0,0.8);
}

@media (max-width: 768px) {
  .slider img {
    height: 250px;
  }
}
</style>

<script>
function nextSlide(sliderId) {
  const slider = document.getElementById(sliderId);
  const slideWidth = slider.children[0].offsetWidth;
  slider.scrollLeft += slideWidth;
  
  if (slider.scrollLeft >= slider.scrollWidth - slider.offsetWidth) {
    slider.scrollLeft = 0;
  }
}

function prevSlide(sliderId) {
  const slider = document.getElementById(sliderId);
  const slideWidth = slider.children[0].offsetWidth;
  slider.scrollLeft -= slideWidth;
  
  if (slider.scrollLeft <= 0) {
    slider.scrollLeft = slider.scrollWidth - slider.offsetWidth;
  }
}
</script>
