<div class="search-container">
  <input type="text" id="search-input" placeholder="Search posts..." />
  <div class="filters">
    <select id="location-filter">
      <option value="">All Locations</option>
      <option value="himalayas">Himalayas</option>
      <option value="rajasthan">Rajasthan</option>
      <option value="himachal">Himachal Pradesh</option>
    </select>
    <select id="difficulty-filter">
      <option value="">All Difficulty</option>
      <option value="easy">Easy</option>
      <option value="moderate">Moderate</option>
      <option value="hard">Hard</option>
    </select>
    <select id="season-filter">
      <option value="">All Seasons</option>
      <option value="winter">Winter</option>
      <option value="summer">Summer</option>
      <option value="monsoon">Monsoon</option>
    </select>
  </div>
</div>

<div id="search-results"></div>

<script>
let posts = [];
fetch('/travel/index.json')
  .then(response => response.json())
  .then(data => {
    posts = data;
    displayResults(posts);
  });
const searchInput = document.getElementById('search-input');
const locationFilter = document.getElementById('location-filter');
const difficultyFilter = document.getElementById('difficulty-filter');
const seasonFilter = document.getElementById('season-filter');
const resultsDiv = document.getElementById('search-results');

function filterPosts() {
  const query = searchInput.value.toLowerCase();
  const location = locationFilter.value;
  const difficulty = difficultyFilter.value;
  const season = seasonFilter.value;
  
  const filtered = posts.filter(post => {
    const matchesQuery = !query || post.title.toLowerCase().includes(query) || 
                        post.content.toLowerCase().includes(query);
    const matchesLocation = !location || (post.tags && post.tags.includes(location));
    const matchesDifficulty = !difficulty || (post.tags && post.tags.includes(difficulty));
    const matchesSeason = !season || (post.tags && post.tags.includes(season));
    
    return matchesQuery && matchesLocation && matchesDifficulty && matchesSeason;
  });
  
  displayResults(filtered);
}

function displayResults(posts) {
  if (posts.length === 0) {
    resultsDiv.innerHTML = '<p>No posts found.</p>';
    return;
  }
  
  resultsDiv.innerHTML = posts.map(post => `
    <div class="search-result">
      <h3><a href="${post.permalink}">${post.title}</a></h3>
      <p>${post.summary}</p>
      <div class="post-meta">
        <span>${post.date}</span>
        ${post.tags ? post.tags.map(tag => `<span class="tag">${tag}</span>`).join('') : ''}
      </div>
    </div>
  `).join('');
}

searchInput.addEventListener('input', filterPosts);
locationFilter.addEventListener('change', filterPosts);
difficultyFilter.addEventListener('change', filterPosts);
seasonFilter.addEventListener('change', filterPosts);
</script>
