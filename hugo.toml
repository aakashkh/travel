baseURL = 'https://aakashkh.github.io/travel'
languageCode = 'en-gb'
title = 'Travel Itinerary'
theme = 'PaperMod'

# Blowfish theme settings
[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[taxonomies]
  tag = "tags"
  category = "categories"

[params]
  # PaperMod settings
  env = "production"
  title = "Travel Itinerary"
  description = "Epic Himalayan Adventures Await - Discover breathtaking treks, hidden gems, and unforgettable journeys through India's most spectacular mountain destinations"
  keywords = ["travel", "trekking", "himalayas", "adventure", "blog"]
  author = "Aakash Khandelwal"
  
  # Theme features
  ShowReadingTime = true
  ShowShareButtons = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowWordCount = true
  ShowRssButtonInSectionTermList = true
  UseHugoToc = true
  disableSpecial1stPost = false
  disableScrollToTop = false
  comments = false
  hidemeta = false
  hideSummary = false
  showtoc = true
  tocopen = false
  
  # Home page
  [params.homeInfoParams]
    Title = "Epic Himalayan Adventures Await 🏔️"
    Content = "Discover breathtaking treks, hidden gems, and unforgettable journeys through India's most spectacular mountain destinations. Detailed itineraries, costs, and insider tips for your perfect adventure."
  
  # Social icons
  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/aakashkh"
  
[menu]
  [[menu.main]]
    name = "Home"
    url = "/"
    weight = 10
  [[menu.main]]
    name = "Kuari Pass"
    url = "/posts/kuari-pass/"
    weight = 20
  [[menu.main]]
    name = "Dharamshala"
    url = "/posts/dharamshala/"
    weight = 30
  [[menu.main]]
    name = "Kota Road Trip"
    url = "/posts/kota-trip/"
    weight = 40