baseURL = "https://aakashkh.github.io/travel/"
languageCode = "en-us"
title = "Travel Blog"
theme = "PaperMod"

# Site params
[pagination]
  pagerSize = 5

enableRobotsTXT = true
buildDrafts = false
buildFuture = false
buildExpired = false
minify = true

# Output formats - ensure HTML is always generated
[outputs]
  home = ["HTML", "RSS", "JSON"]
  page = ["HTML"]
  section = ["HTML", "RSS"]
  taxonomy = ["HTML", "RSS"]
  term = ["HTML", "RSS"]

[params]
  env = "production"
  title = "Travel Blog"
  description = "A collection of travel adventures and tips."
  keywords = ["travel", "blog", "adventures"]
  author = "Aakash Kh"
  images = ["images/og-image.jpg"]
  DateFormat = "January 2, 2006"
  defaultTheme = "auto"
  disableThemeToggle = false
  ShowReadingTime = true
  ShowShareButtons = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = false
  ShowWordCount = true
  ShowRssButtonInSectionTermList = true
  UseHugoToc = true
  disableSpecial1stPost = false
  disableScrollToTop = false
  comments = true
  hidemeta = false
  hideSummary = false
  showtoc = false
  tocopen = false
  
  # Show posts on homepage
  mainSections = ["posts"]
  
  # Comments using Giscus (GitHub Discussions)
  [params.giscus]
    repo = "aakashkh/travel"
    repoId = "R_kgDONhqJJw"
    category = "General"
    categoryId = "DIC_kwDONhqJJ84ClIJj"
    mapping = "pathname"
    strict = "0"
    reactionsEnabled = "1"
    emitMetadata = "0"
    inputPosition = "bottom"
    theme = "preferred_color_scheme"
    lang = "en"
    loading = "lazy"

# Profile mode - disabled to show homepage content
[params.profileMode]
  enabled = false

# Menu
[menu]
  [[menu.main]]
    identifier = "posts"
    name = "Posts"
    url = "/posts/"
    weight = 10
  [[menu.main]]
    identifier = "tags"
    name = "Tags"
    url = "/tags/"
    weight = 20
  [[menu.main]]
    identifier = "about"
    name = "About"
    url = "/about/"
    weight = 30

# Social icons
[[params.socialIcons]]
  name = "github"
  url = "https://github.com/aakashkh"