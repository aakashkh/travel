baseURL = "https://aakashkh.github.io/travel/"
languageCode = "en-us"
title = "Travel Blog"
theme = "PaperMod"

# Site params
[pagination]
  pagerSize = 5

enableRobotsTXT = true
buildDrafts = false
buildFuture = false
buildExpired = false
minify = true

# Output formats - ensure HTML is always generated
[outputs]
  home = ["HTML", "RSS", "JSON"]
  page = ["HTML"]
  section = ["HTML", "RSS"]
  taxonomy = ["HTML", "RSS"]
  term = ["HTML", "RSS"]

[params]
  env = "production"
  title = "Travel Blog"
  description = "A collection of travel adventures and tips."
  keywords = ["travel", "blog", "adventures"]
  author = "Aakash Kh"
  images = ["images/og-image.jpg"]
  DateFormat = "January 2, 2006"
  defaultTheme = "auto"
  disableThemeToggle = false
  ShowReadingTime = true
  ShowShareButtons = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = false
  ShowWordCount = true
  ShowRssButtonInSectionTermList = true
  UseHugoToc = true
  disableSpecial1stPost = false
  disableScrollToTop = false
  comments = false
  hidemeta = false
  hideSummary = false
  showtoc = false
  tocopen = false

# Profile mode
[params.profileMode]
  enabled = true
  title = "Aakash Kh"
  subtitle = "Wanderlust Enthusiast"
  imageUrl = "/images/avatar.jpg"
  imageWidth = 120
  imageHeight = 120
  buttons = [
    {name = "Posts", url = "posts/"},
    {name = "Tags", url = "tags/"}
  ]

# Menu
[menu]
  [[menu.main]]
    identifier = "posts"
    name = "Posts"
    url = "/posts/"
    weight = 10
  [[menu.main]]
    identifier = "tags"
    name = "Tags"
    url = "/tags/"
    weight = 20
  [[menu.main]]
    identifier = "about"
    name = "About"
    url = "/about/"
    weight = 30

# Social icons
[[params.socialIcons]]
  name = "github"
  url = "https://github.com/aakashkh"